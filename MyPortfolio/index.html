<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.2.0/remixicon.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <header class="page-header">
        <div class="page-container">
            <div class="inner">
                <div class="page-logo">
                    <a href="#"><span>Mea</span></a>
                </div>
                <div class="header-btns">
                    <div class="page-main-btn border-btn contact-me-btn">
                        <a href="#contact">Contact Me</a>
                    </div>
                    <a href="#contact" class="contact-me-icon"><i class="ri-user-3-fill"></i></i></a>
                    <div class="theme-btn">
                        <i class="ri-sun-fill sun-icon"></i>
                        <i class="ri-moon-fill moon-icon"></i>
                    </div>
                </div>
            </div>
    </header>

    <div class="bottom-nav-container">
        <div class="bottom-nav">
            <div class=" bottom-nav-inner">
                <i class="ri-arrow-left-down-line menu-hide-btn"></i>
                <ul class="menu">
                    <li class="menu-item"><a href="#home" class="current"><i
                                class="ri-home-4-line"></i><span>Home</span></a></li>
                    <li class="menu-item"><a href="#about"><i class="ri-user-line"></i><span>About</span></a>
                    </li>
                    <li class="menu-item"><a href="#resume"><i class="ri-menu-fold-4-line"></i><span>Resume</span></a>
                    </li>
                    <li class="menu-item"><a href="#service"><i class="ri-service-line"></i><span>Service</span></a>
                    </li>
                    <li class="menu-item"><a href="#portfolio"><i
                                class="ri-briefcase-line"></i><span>Portfolio</span></a></li>
                    <li class="menu-item"><a href="#contact"><i class="ri-chat-1-line"></i><span>Contact</span></a></li>
                </ul>
            </div>
        </div>
        <div class=" menu-show-btn">
            <div class="bar-01"></div>
            <div class="bar-02"></div>
        </div>
    </div>

    <section class="page-section nav-menu-section" id="home">
        <div class="page-container home-container">
            <div class="page-wrapper">
                <div class="home-social">
                    <ul class="social-icons">
                        <li><a href="#"><i class="ri-facebook-fill"></i></a></li>
                        <li><a href="#"><i class="ri-instagram-line"></i></a></li>
                        <li><a href="#"><i class="ri-linkedin-fill"></i></a></li>
                    </ul>
                </div>
                <div class="profile-container">
                    <div class="page-main-btn fill-btn hire-btn-01">
                        <a href="#">Hire Me <i class="ri-user-follow-line"></i></a>
                    </div>
                    <div class="profile-img">
                        <img src="profile_pic.png" alt="Profile Image">
                    </div>
                    <div class="profile-info">
                        <div class="text-content">
                            <h4 class="hello-text">Hello, I'm</h4>
                            <h1 class="name-text">Meabelle Nomo</h1>
                            <p class="what-I-do">Aspiring Web & Graphic Designer</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
